services:
  db:
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cyber_sim}
      POSTGRES_USER: ${POSTGRES_USER:-cyber}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-db-password}

  api:
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-production}
      SECRET_KEY: ${SECRET_KEY:-change-me}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-cyber}:${POSTGRES_PASSWORD:-change-me-db-password}@db:5432/${POSTGRES_DB:-cyber_sim}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      FRONTEND_ORIGIN: https://${DOMAIN:-example.com}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-Admin}
      ADMIN_BOOTSTRAP_PASSWORD: ${ADMIN_BOOTSTRAP_PASSWORD:-change-me-admin-password}

  web:
    build:
      args:
        NEXT_PUBLIC_API_URL: https://${DOMAIN:-example.com}
        NEXT_PUBLIC_WS_URL: wss://${DOMAIN:-example.com}
    environment:
      NEXT_PUBLIC_API_URL: https://${DOMAIN:-example.com}
      NEXT_PUBLIC_WS_URL: wss://${DOMAIN:-example.com}

  nginx:
    ports:
      - "443:443"
    volumes:
      - ./infra/letsencrypt/www:/var/www/certbot
      - ./infra/letsencrypt/conf:/etc/letsencrypt
    environment:
      DOMAIN: ${DOMAIN:-example.com}
      NGINX_TEMPLATE: app.conf.template
    healthcheck:
      test: ["CMD-SHELL", "wget --no-check-certificate -q -O /dev/null https://127.0.0.1/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  nginx_bootstrap:
    image: nginx:1.27-alpine
    restart: unless-stopped
    profiles:
      - bootstrap
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx:/etc/nginx/templates:ro
      - ./infra/letsencrypt/www:/var/www/certbot
    environment:
      DOMAIN: ${DOMAIN:-example.com}
      NGINX_TEMPLATE: bootstrap.conf.template
    command:
      - /bin/sh
      - -c
      - |
        envsubst '$${DOMAIN}' < "/etc/nginx/templates/$${NGINX_TEMPLATE}" > /etc/nginx/conf.d/default.conf
        exec nginx -g 'daemon off;'

  certbot:
    image: certbot/certbot:latest
    volumes:
      - ./infra/letsencrypt/www:/var/www/certbot
      - ./infra/letsencrypt/conf:/etc/letsencrypt
    entrypoint: /bin/sh
    command:
      - -c
      - |
        trap exit TERM;
        while :; do
          certbot renew --webroot -w /var/www/certbot --quiet;
          sleep 12h & wait $${!};
        done
