services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: cyber_sim
      POSTGRES_USER: cyber
      POSTGRES_PASSWORD: cyber
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cyber -d cyber_sim"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    restart: unless-stopped
    environment:
      ENVIRONMENT: development
      SECRET_KEY: change-me
      DATABASE_URL: postgresql+psycopg://cyber:cyber@db:5432/cyber_sim
      REDIS_URL: redis://redis:6379/0
      FRONTEND_ORIGIN: http://localhost
      ADMIN_USERNAME: Admin
      ADMIN_BOOTSTRAP_PASSWORD: AdminCyber12
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s

  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost
        NEXT_PUBLIC_WS_URL: ws://localhost
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost
      NEXT_PUBLIC_WS_URL: ws://localhost
    depends_on:
      api:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      web:
        condition: service_started
      api:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx:/etc/nginx/templates:ro
    environment:
      DOMAIN: localhost
      NGINX_TEMPLATE: local.conf.template
    command:
      - /bin/sh
      - -c
      - |
        envsubst '$${DOMAIN}' < "/etc/nginx/templates/$${NGINX_TEMPLATE}" > /etc/nginx/conf.d/default.conf
        exec nginx -g 'daemon off;'
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

volumes:
  postgres_data:
